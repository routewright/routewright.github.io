<!doctype html>
<html lang="en">
{{ partial "head.html" . }}
<body>
  {{ partial "statusbar.html" . }}
  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ $js := resources.Get "js/stats.js" | resources.ExecuteAsTemplate "js/stats.js" . | minify | fingerprint }}
  <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" defer></script>
</body>
</html>
