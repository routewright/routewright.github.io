{{- $gh := partialCached "gh-data" . -}}
{{- $repoURL := printf "https://github.com/%s/%s" .Site.Params.ghOwner .Site.Params.ghRepo -}}
<header class="statusbar">
  <div class="statusbar__inner">
    <a href="{{ "/" | relURL }}" class="brand" aria-label="Routewright home">
      {{ partial "logo.html" (dict "class" "brand__mark") }}
      <span class="brand__name">routewright</span><span class="cursor" aria-hidden="true"></span>
    </a>

    <nav class="statusbar__nav" aria-label="Primary">
      <a class="navlink {{ if .IsHome }}is-active{{ end }}" href="{{ "/" | relURL }}#why">Why</a>
      <a class="navlink {{ if eq .RelPermalink "/roadmap/" }}is-active{{ end }}" href="{{ "/roadmap/" | relURL }}">Roadmap</a>
      <a class="navlink docs" href="{{ .Site.Params.docsURL }}">Docs</a>
      <a class="barstat" href="{{ $repoURL }}" rel="noopener" aria-label="GitHub stars">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>
        <b data-gh="stars" {{ if not $gh.live }}data-pending{{ end }}>{{ if $gh.live }}{{ $gh.d.stargazers_count }}{{ else }}·{{ end }}</b>
      </a>
    </nav>
  </div>
</header>
