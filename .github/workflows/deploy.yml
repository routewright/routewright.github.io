name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Re-bake the GitHub stat snapshot a couple of times a day so no-JS visitors
  # don't see a stale star count between content pushes.
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: "0.163.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Hugo
        run: |
          set -euo pipefail
          url="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          curl -fsSL -o /tmp/hugo.deb "$url"
          sudo dpkg -i /tmp/hugo.deb

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build
        env:
          # Authenticates resources.GetRemote so the build-time stat bake dodges
          # GitHub's unauthenticated rate limit. Prefer a dedicated token (needed
          # only if routewright/routewright is private) and fall back to the
          # workflow token (sufficient once the repo is public).
          GITHUB_TOKEN: ${{ secrets.GH_STATS_TOKEN || secrets.GITHUB_TOKEN }}
          HUGO_ENVIRONMENT: production
        run: |
          hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
